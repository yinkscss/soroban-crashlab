name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  core:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: contracts/crashlab-core
    steps:
      - uses: actions/checkout@v4
      - run: cargo test --all-targets

  soroban-example:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: contracts/soroban-example
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-unknown-unknown
      - run: cargo test --all-targets
      - run: cargo build --target wasm32-unknown-unknown --release

  ops-scripts-syntax:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - run: bash -n scripts/backlog-freshness-review.sh
      - run: bash -n scripts/contracts/build-soroban-example.sh

  regression:
    needs: [core, web]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: contracts/crashlab-core
    steps:
      - uses: actions/checkout@v4
      - run: cargo run --bin crashlab -- regression-suite fixtures/
